<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Business — Apna Influencer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="business.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/js/all.min.js"></script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
<div class="app-container">

  <!-- ── DASHBOARD SHELL ── -->
  <section id="bv-dash" class="view active">

    <!-- Header -->
    <div class="biz-header">
      <div class="biz-header-left">
        <div class="biz-avatar-sm" id="biz-avatar-sm">C</div>
        <div>
          <p class="biz-header-name" id="biz-header-name">Chai Wala Café</p>
          <p class="biz-header-city" id="biz-header-city">Delhi · Café</p>
        </div>
      </div>
      <a href="index.html" class="btn-icon-logout" title="Back to home">
        <i class="fa-solid fa-right-from-bracket"></i>
      </a>
    </div>

    <!-- Tab content area -->
    <div class="biz-tab-content" id="biz-tab-content">
      <!-- Injected by business.js -->
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="biz-nav-discover" onclick="bizTab('discover')">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Discover</span>
      </button>
      <button class="nav-item" id="biz-nav-projects" onclick="bizTab('projects')">
        <i class="fa-solid fa-briefcase"></i>
        <span>Projects</span>
        <span class="nav-badge hidden" id="badge-projects"></span>
      </button>
      <button class="nav-item" id="biz-nav-messages" onclick="bizTab('messages')">
        <i class="fa-solid fa-message"></i>
        <span>Messages</span>
        <span class="nav-badge hidden" id="badge-messages"></span>
      </button>
      <button class="nav-item" id="biz-nav-account" onclick="bizTab('account')">
        <i class="fa-solid fa-building"></i>
        <span>Account</span>
      </button>
    </nav>

  </section>

  <!-- ── CHAT DETAIL VIEW ── -->
  <section id="bv-chat" class="view hidden">
    <div class="chat-header">
      <button class="btn-back" onclick="closeBizChat()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="chat-header-info" id="biz-chat-header-info"></div>
    </div>
    <div class="chat-offer-banner" id="biz-chat-offer-banner"></div>
    <div class="chat-messages" id="biz-chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="biz-chat-input" type="text"
             placeholder="Type a message…"
             onkeydown="handleBizChatEnter(event)">
      <button class="chat-send-btn" onclick="sendBizMessage()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </section>

</div>
<div id="biz-toast" class="toast hidden"></div>
<script src="business.js"></script>
</body>
</html>
